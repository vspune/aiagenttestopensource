[pytest]
pythonpath = . 
testpaths = tests          ← look for tests inside the /tests folder
python_files = test_*.py   ← only pick up files starting with test_
python_classes = Test*     ← only pick up classes starting with Test
python_functions = test_*  ← only pick up functions starting with test_
addopts = -v --tb=short --html=reports/report.html --self-contained-html

markers =
    smoke:        Fast basic tests — run on every commit
    integration:  Full agent flow tests — LLM + Tools + API
    unit:         Individual function tests — no LLM
    slow:         Tests that take more than 10 seconds
    security:     Jailbreak, railguard, hallucination tests
    regression:   Full suite — run before releases
    smoke1:       Smoke test for response time — run on every commit
    test2:        Test for latency improvement on second call
    llm_override: Test for LLM override